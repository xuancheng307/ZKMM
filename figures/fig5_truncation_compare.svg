<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <style>
    text { font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
    .title { font-size: 16px; font-weight: bold; fill: #1a202c; }
    .step-label { font-size: 12px; fill: #2d3748; }
    .mono { font-family: "Consolas", "Fira Mono", "Courier New", monospace; font-size: 11px; }
    .scissors { font-size: 14px; }
    .bit-label { font-size: 11px; font-weight: 600; }
    .result-text { font-size: 12px; font-weight: bold; fill: white; }
    .note { font-size: 11px; fill: #4a5568; }
    .arrow-note { font-size: 11px; fill: #2f855a; font-style: italic; }
  </style>
  <defs>
    <marker id="arrow-gray" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#a0aec0"/>
    </marker>
    <marker id="arrow-green" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#38a169"/>
    </marker>
    <marker id="arrow-red" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#e53e3e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="white"/>

  <!-- Divider -->
  <line x1="400" y1="30" x2="400" y2="470" stroke="#CBD5E0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ==================== LEFT SIDE: Per-Step Truncation ==================== -->
  <text x="200" y="28" text-anchor="middle" class="title" fill="#c53030">Per-Step Truncation</text>

  <!-- Step boxes and truncation markers -->
  <!-- Step 1 -->
  <rect x="70" y="45" width="260" height="34" rx="6" fill="#FFF5F5" stroke="#FC8181" stroke-width="1.2"/>
  <text x="200" y="66" text-anchor="middle" class="step-label">Step 1: acc &#xD7; R + D</text>
  <text x="289" y="66" text-anchor="middle" class="step-label" font-size="9" dy="3">5</text>

  <!-- Truncate 1 -->
  <line x1="200" y1="79" x2="200" y2="95" stroke="#a0aec0" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <text x="220" y="90" class="scissors" fill="#e53e3e">&#x2702;</text>
  <text x="240" y="92" class="mono" fill="#c53030">truncate</text>
  <text x="330" y="92" class="bit-label" fill="#718096">16 bits</text>

  <!-- Step 2 -->
  <rect x="70" y="100" width="260" height="34" rx="6" fill="#FFF5F5" stroke="#FC8181" stroke-width="1.2"/>
  <text x="200" y="121" text-anchor="middle" class="step-label">Step 2: acc &#xD7; R + D</text>
  <text x="289" y="121" text-anchor="middle" class="step-label" font-size="9" dy="3">4</text>

  <!-- Truncate 2 -->
  <line x1="200" y1="134" x2="200" y2="150" stroke="#a0aec0" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <text x="220" y="145" class="scissors" fill="#e53e3e">&#x2702;</text>
  <text x="240" y="147" class="mono" fill="#c53030">truncate</text>
  <text x="330" y="147" class="bit-label" fill="#718096">16 bits</text>

  <!-- Step 3 -->
  <rect x="70" y="155" width="260" height="34" rx="6" fill="#FFF5F5" stroke="#FC8181" stroke-width="1.2"/>
  <text x="200" y="176" text-anchor="middle" class="step-label">Step 3: acc &#xD7; R + D</text>
  <text x="289" y="176" text-anchor="middle" class="step-label" font-size="9" dy="3">3</text>

  <!-- Truncate 3 -->
  <line x1="200" y1="189" x2="200" y2="205" stroke="#a0aec0" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <text x="220" y="200" class="scissors" fill="#e53e3e">&#x2702;</text>
  <text x="240" y="202" class="mono" fill="#c53030">truncate</text>
  <text x="330" y="202" class="bit-label" fill="#718096">16 bits</text>

  <!-- Step 4 -->
  <rect x="70" y="210" width="260" height="34" rx="6" fill="#FFF5F5" stroke="#FC8181" stroke-width="1.2"/>
  <text x="200" y="231" text-anchor="middle" class="step-label">Step 4: acc &#xD7; R + D</text>
  <text x="289" y="231" text-anchor="middle" class="step-label" font-size="9" dy="3">2</text>

  <!-- Truncate 4 -->
  <line x1="200" y1="244" x2="200" y2="260" stroke="#a0aec0" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <text x="220" y="255" class="scissors" fill="#e53e3e">&#x2702;</text>
  <text x="240" y="257" class="mono" fill="#c53030">truncate</text>
  <text x="330" y="257" class="bit-label" fill="#718096">16 bits</text>

  <!-- Step 5 -->
  <rect x="70" y="265" width="260" height="34" rx="6" fill="#FFF5F5" stroke="#FC8181" stroke-width="1.2"/>
  <text x="200" y="286" text-anchor="middle" class="step-label">Step 5: acc &#xD7; R + D</text>
  <text x="289" y="286" text-anchor="middle" class="step-label" font-size="9" dy="3">1</text>

  <!-- Truncate 5 -->
  <line x1="200" y1="299" x2="200" y2="315" stroke="#a0aec0" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <text x="220" y="310" class="scissors" fill="#e53e3e">&#x2702;</text>
  <text x="240" y="312" class="mono" fill="#c53030">truncate</text>
  <text x="330" y="312" class="bit-label" fill="#718096">16 bits</text>

  <!-- Result arrow -->
  <line x1="200" y1="320" x2="200" y2="345" stroke="#a0aec0" stroke-width="1" marker-end="url(#arrow-gray)"/>

  <!-- Per-step result box -->
  <rect x="55" y="350" width="290" height="50" rx="8" fill="#e53e3e"/>
  <text x="200" y="371" text-anchor="middle" class="result-text" font-size="13">Max ULP Error</text>
  <text x="200" y="390" text-anchor="middle" class="result-text" font-family="'Consolas', monospace" font-size="12">exp: 2 | ln: 2 | erf: 6</text>


  <!-- ==================== RIGHT SIDE: Deferred Truncation ==================== -->
  <text x="600" y="28" text-anchor="middle" class="title" fill="#2f855a">Deferred Truncation (Ours)</text>

  <!-- Step 1 -->
  <rect x="470" y="45" width="260" height="34" rx="6" fill="#F0FFF4" stroke="#68D391" stroke-width="1.2"/>
  <text x="600" y="66" text-anchor="middle" class="step-label">Step 1: acc &#xD7; R + D</text>
  <text x="689" y="66" text-anchor="middle" class="step-label" font-size="9" dy="3">5</text>

  <!-- Full precision + bit width -->
  <line x1="600" y1="79" x2="600" y2="95" stroke="#a0aec0" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <text x="650" y="92" class="mono" fill="#38a169">full precision</text>
  <text x="498" y="92" class="bit-label" fill="#2f855a">32 bits</text>

  <!-- Step 2 -->
  <rect x="470" y="100" width="260" height="34" rx="6" fill="#F0FFF4" stroke="#68D391" stroke-width="1.2"/>
  <text x="600" y="121" text-anchor="middle" class="step-label">Step 2: acc &#xD7; R + D</text>
  <text x="689" y="121" text-anchor="middle" class="step-label" font-size="9" dy="3">4</text>

  <line x1="600" y1="134" x2="600" y2="150" stroke="#a0aec0" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <text x="650" y="147" class="mono" fill="#38a169">full precision</text>
  <text x="498" y="147" class="bit-label" fill="#2f855a">48 bits</text>

  <!-- Step 3 -->
  <rect x="470" y="155" width="260" height="34" rx="6" fill="#F0FFF4" stroke="#68D391" stroke-width="1.2"/>
  <text x="600" y="176" text-anchor="middle" class="step-label">Step 3: acc &#xD7; R + D</text>
  <text x="689" y="176" text-anchor="middle" class="step-label" font-size="9" dy="3">3</text>

  <line x1="600" y1="189" x2="600" y2="205" stroke="#a0aec0" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <text x="650" y="202" class="mono" fill="#38a169">full precision</text>
  <text x="498" y="202" class="bit-label" fill="#2f855a">64 bits</text>

  <!-- Step 4 -->
  <rect x="470" y="210" width="260" height="34" rx="6" fill="#F0FFF4" stroke="#68D391" stroke-width="1.2"/>
  <text x="600" y="231" text-anchor="middle" class="step-label">Step 4: acc &#xD7; R + D</text>
  <text x="689" y="231" text-anchor="middle" class="step-label" font-size="9" dy="3">2</text>

  <line x1="600" y1="244" x2="600" y2="260" stroke="#a0aec0" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <text x="650" y="257" class="mono" fill="#38a169">full precision</text>
  <text x="498" y="257" class="bit-label" fill="#2f855a">80 bits</text>

  <!-- Step 5 -->
  <rect x="470" y="265" width="260" height="34" rx="6" fill="#F0FFF4" stroke="#68D391" stroke-width="1.2"/>
  <text x="600" y="286" text-anchor="middle" class="step-label">Step 5: acc &#xD7; R + D</text>
  <text x="689" y="286" text-anchor="middle" class="step-label" font-size="9" dy="3">1</text>

  <!-- Single truncation after all steps -->
  <line x1="600" y1="299" x2="600" y2="320" stroke="#38a169" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="620" y="315" class="scissors" fill="#2f855a" font-size="16">&#x2702;</text>
  <text x="644" y="317" class="mono" fill="#2f855a" font-weight="bold">single truncation</text>
  <text x="498" y="317" class="bit-label" fill="#2f855a">96 bits</text>

  <!-- Annotation: 96 bits << 254 bits -->
  <rect x="468" y="325" width="264" height="20" rx="4" fill="#EBF8FF" stroke="#63B3ED" stroke-width="0.8"/>
  <text x="600" y="339" text-anchor="middle" class="arrow-note" fill="#2b6cb0" font-size="11">96 bits &#x226A; 254 bits (BN254 field) -- no overflow</text>

  <!-- Result arrow -->
  <line x1="600" y1="348" x2="600" y2="365" stroke="#a0aec0" stroke-width="1" marker-end="url(#arrow-gray)"/>

  <!-- Deferred result box -->
  <rect x="455" y="370" width="290" height="50" rx="8" fill="#38a169"/>
  <text x="600" y="391" text-anchor="middle" class="result-text" font-size="13">Max ULP Error</text>
  <text x="600" y="410" text-anchor="middle" class="result-text" font-family="'Consolas', monospace" font-size="12">exp: 1 | ln: 1 | erf: 3</text>

  <!-- VS label -->
  <text x="400" y="250" text-anchor="middle" font-size="20" font-weight="bold" fill="#a0aec0" font-family="sans-serif">vs</text>

  <!-- Bottom comparison note -->
  <text x="400" y="475" text-anchor="middle" class="note" font-size="12" fill="#4a5568">Deferred truncation halves ULP error by eliminating intermediate rounding</text>
</svg>