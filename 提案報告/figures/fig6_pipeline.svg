<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250">
  <style>
    text { font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
    .box-title { font-size: 13px; font-weight: 600; fill: #2d3748; }
    .box-subtitle { font-size: 10.5px; fill: #718096; font-style: italic; }
    .box-detail { font-family: "Consolas", "Fira Mono", monospace; font-size: 10px; fill: #4a5568; }
    .green-title { font-size: 14px; font-weight: 700; fill: #22543d; }
    .green-subtitle { font-size: 11px; font-weight: 600; fill: #2f855a; }
    .green-detail { font-family: "Consolas", "Fira Mono", monospace; font-size: 10px; fill: #276749; }
    .bracket-text { font-size: 11px; fill: #2f855a; font-weight: 600; }
    .example { font-size: 10px; fill: #a0aec0; font-style: italic; }
  </style>
  <defs>
    <marker id="pipe-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#718096"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="250" fill="white"/>

  <!-- ===== Box 1: Application Input ===== -->
  <rect x="20" y="55" width="130" height="60" rx="8" fill="#EDF2F7" stroke="#A0AEC0" stroke-width="1.5"/>
  <text x="85" y="82" text-anchor="middle" class="box-title">Application Input</text>
  <text x="85" y="100" text-anchor="middle" class="box-detail" font-style="italic">x</text>
  <text x="85" y="130" text-anchor="middle" class="example">(e.g., x = 5.0)</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="85" x2="188" y2="85" stroke="#718096" stroke-width="1.8" marker-end="url(#pipe-arrow)"/>

  <!-- ===== Box 2: Range Reduction ===== -->
  <rect x="195" y="55" width="145" height="60" rx="8" fill="#EDF2F7" stroke="#A0AEC0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="267" y="80" text-anchor="middle" class="box-title">Range Reduction</text>
  <text x="267" y="97" text-anchor="middle" class="box-subtitle">(function-specific,</text>
  <text x="267" y="109" text-anchor="middle" class="box-subtitle">future work)</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="85" x2="378" y2="85" stroke="#718096" stroke-width="1.8" marker-end="url(#pipe-arrow)"/>

  <!-- ===== Box 3: Horner Kernel + ExplicitRC (GREEN, dominant) ===== -->
  <rect x="385" y="40" width="190" height="90" rx="10" fill="#F0FFF4" stroke="#2F855A" stroke-width="3"/>
  <text x="480" y="75" text-anchor="middle" class="green-title">Horner Kernel + ExplicitRC</text>
  <text x="480" y="100" text-anchor="middle" class="green-detail">6 gates &#xB7; 12 lookups &#xB7; 256 entries</text>

  <!-- "This Paper" badge -->
  <rect x="440" y="17" width="80" height="20" rx="10" fill="#2F855A"/>
  <text x="480" y="31" text-anchor="middle" font-size="10" font-weight="bold" fill="white">This Paper</text>

  <!-- Bracket + ULP annotation below green box -->
  <!-- Left bracket arm -->
  <line x1="405" y1="140" x2="405" y2="150" stroke="#2F855A" stroke-width="1.5"/>
  <line x1="405" y1="150" x2="480" y2="150" stroke="#2F855A" stroke-width="1.5"/>
  <!-- Right bracket arm -->
  <line x1="555" y1="140" x2="555" y2="150" stroke="#2F855A" stroke-width="1.5"/>
  <line x1="555" y1="150" x2="480" y2="150" stroke="#2F855A" stroke-width="1.5"/>
  <!-- Bracket point -->
  <line x1="480" y1="150" x2="480" y2="160" stroke="#2F855A" stroke-width="1.5"/>

  <!-- ULP label -->
  <rect x="400" y="165" width="160" height="22" rx="6" fill="#F0FFF4" stroke="#68D391" stroke-width="1"/>
  <text x="480" y="180" text-anchor="middle" class="bracket-text" font-family="'Consolas', monospace" font-size="11">ULP = 1(exp) 1(ln) 3(erf)</text>

  <!-- Arrow 3 -->
  <line x1="575" y1="85" x2="613" y2="85" stroke="#718096" stroke-width="1.8" marker-end="url(#pipe-arrow)"/>

  <!-- ===== Box 4: Reconstruction ===== -->
  <rect x="620" y="55" width="140" height="60" rx="8" fill="#EDF2F7" stroke="#A0AEC0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="690" y="80" text-anchor="middle" class="box-title">Reconstruction</text>
  <text x="690" y="97" text-anchor="middle" class="box-subtitle">(function-specific,</text>
  <text x="690" y="109" text-anchor="middle" class="box-subtitle">future work)</text>

  <!-- Arrow 4 -->
  <line x1="760" y1="85" x2="778" y2="85" stroke="#718096" stroke-width="1.8" marker-end="url(#pipe-arrow)"/>

  <!-- ===== Box 5: Output ===== -->
  <rect x="785" y="55" width="95" height="60" rx="8" fill="#EDF2F7" stroke="#A0AEC0" stroke-width="1.5"/>
  <text x="832" y="82" text-anchor="middle" class="box-title">Output</text>
  <text x="832" y="100" text-anchor="middle" class="box-detail" font-style="italic">f(x)</text>

  <!-- Scope annotation line at top -->
  <line x1="195" y1="218" x2="385" y2="218" stroke="#A0AEC0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="575" y1="218" x2="760" y2="218" stroke="#A0AEC0" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="290" y="235" text-anchor="middle" class="example" font-size="10" fill="#a0aec0">Future work</text>
  <text x="667" y="235" text-anchor="middle" class="example" font-size="10" fill="#a0aec0">Future work</text>

  <!-- Scope highlight bar under green box -->
  <rect x="385" y="215" width="190" height="6" rx="3" fill="#2F855A" opacity="0.3"/>
  <text x="480" y="235" text-anchor="middle" font-size="10" font-weight="bold" fill="#2F855A">Scope of this thesis</text>
</svg>