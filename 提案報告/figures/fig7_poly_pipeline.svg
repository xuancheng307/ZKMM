<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
  <style>
    text { font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
    .step-num { font-size: 14px; font-weight: 700; fill: white; }
    .step-title { font-size: 13px; font-weight: 600; fill: #2d3748; }
    .step-detail { font-size: 10.5px; fill: #4a5568; }
    .step-math { font-family: "Consolas", "Fira Mono", monospace; font-size: 10.5px; fill: #553c9a; }
    .step-example { font-size: 9.5px; fill: #a0aec0; font-style: italic; }
    .label { font-size: 11px; fill: #718096; }
    .section-label { font-size: 12px; font-weight: 700; fill: #2b6cb0; }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#718096"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2b6cb0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" fill="white"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1a365d">多項式逼近法的標準 Pipeline（6 個步驟）</text>

  <!-- ===== Row 1: Steps 1-3 (Offline / Design Time) ===== -->
  <text x="25" y="62" class="section-label">離線設計階段</text>
  <rect x="20" y="68" width="860" height="108" rx="8" fill="#F7FAFC" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Step 1: Choose interval -->
  <rect x="40" y="80" width="240" height="85" rx="8" fill="white" stroke="#CBD5E0" stroke-width="1.5"/>
  <circle cx="58" cy="97" r="12" fill="#2b6cb0"/>
  <text x="58" y="101" text-anchor="middle" class="step-num">1</text>
  <text x="78" y="97" class="step-title">選定近似區間 [a, b)</text>
  <text x="55" y="118" class="step-detail">決定函數的作用域</text>
  <text x="55" y="133" class="step-math">exp: [0, ln2)   ln: [0, ln2)</text>
  <text x="55" y="148" class="step-math">erf: [0, 1]</text>

  <!-- Arrow -->
  <line x1="285" y1="120" x2="313" y2="120" stroke="#718096" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Remez -->
  <rect x="320" y="80" width="240" height="85" rx="8" fill="white" stroke="#CBD5E0" stroke-width="1.5"/>
  <circle cx="338" cy="97" r="12" fill="#2b6cb0"/>
  <text x="338" y="101" text-anchor="middle" class="step-num">2</text>
  <text x="358" y="97" class="step-title">Remez 求 Minimax 係數</text>
  <text x="335" y="118" class="step-detail">在區間上最小化 max |f(x) - P(x)|</text>
  <text x="335" y="133" class="step-math">c&#x2081;, c&#x2082;, ..., c&#x2085;</text>
  <text x="335" y="148" class="step-example">(高精度浮點數，如 50 位有效數字)</text>

  <!-- Arrow -->
  <line x1="565" y1="120" x2="593" y2="120" stroke="#718096" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Quantize -->
  <rect x="600" y="80" width="260" height="85" rx="8" fill="white" stroke="#CBD5E0" stroke-width="1.5"/>
  <circle cx="618" cy="97" r="12" fill="#2b6cb0"/>
  <text x="618" y="101" text-anchor="middle" class="step-num">3</text>
  <text x="638" y="97" class="step-title">量化為整數係數</text>
  <text x="615" y="118" class="step-detail">浮點 &#x2192; 固定點整數</text>
  <text x="615" y="133" class="step-math">D&#x1d62; = round(c&#x1d62; &#xd7; S&#x1d49;&#x207a;&#xb9;&#x207b;&#x2071;)</text>
  <text x="615" y="148" class="step-example">(80+ bit integers, fit in BN254 F&#x209a;)</text>

  <!-- ===== Vertical arrow from row 1 to row 2 ===== -->
  <line x1="450" y1="176" x2="450" y2="204" stroke="#718096" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="470" y="195" class="label">寫入電路</text>

  <!-- ===== Row 2: Steps 4-6 (In-circuit / Proving Time) ===== -->
  <text x="25" y="224" class="section-label">電路內（Proving Time）</text>
  <rect x="20" y="230" width="860" height="108" rx="8" fill="#FFFFF0" stroke="#ECC94B" stroke-width="1"/>

  <!-- Step 4: Horner eval -->
  <rect x="40" y="242" width="240" height="85" rx="8" fill="white" stroke="#CBD5E0" stroke-width="1.5"/>
  <circle cx="58" cy="259" r="12" fill="#D69E2E"/>
  <text x="58" y="263" text-anchor="middle" class="step-num">4</text>
  <text x="78" y="259" class="step-title">Horner 逐步求值</text>
  <text x="55" y="280" class="step-math">acc = D&#x2085;</text>
  <text x="55" y="293" class="step-math">acc = acc &#xd7; R + D&#x2084;</text>
  <text x="55" y="306" class="step-math">... (&#xd7;5 steps) &#x2192; P(R)</text>
  <text x="55" y="319" class="step-example">(每步 = 1 Horner gate in F&#x209a;)</text>

  <!-- Arrow -->
  <line x1="285" y1="282" x2="313" y2="282" stroke="#718096" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: Truncation -->
  <rect x="320" y="242" width="240" height="85" rx="8" fill="white" stroke="#CBD5E0" stroke-width="1.5"/>
  <circle cx="338" cy="259" r="12" fill="#D69E2E"/>
  <text x="338" y="263" text-anchor="middle" class="step-num">5</text>
  <text x="358" y="259" class="step-title">截斷 (Truncation)</text>
  <text x="335" y="280" class="step-detail">從 P(R) 取出最終結果 w</text>
  <text x="335" y="295" class="step-math">P(R) = w &#xd7; S&#x2075; + rem</text>
  <text x="335" y="310" class="step-detail">驗證 rem &lt; S&#x2075; (byte decomp)</text>

  <!-- Arrow -->
  <line x1="565" y1="282" x2="593" y2="282" stroke="#718096" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 6: Range verification -->
  <rect x="600" y="242" width="260" height="85" rx="8" fill="white" stroke="#CBD5E0" stroke-width="1.5"/>
  <circle cx="618" cy="259" r="12" fill="#D69E2E"/>
  <text x="618" y="263" text-anchor="middle" class="step-num">6</text>
  <text x="638" y="259" class="step-title">範圍驗證</text>
  <text x="615" y="280" class="step-detail">確認 R &#x2208; [0, R_MAX]</text>
  <text x="615" y="295" class="step-detail">確認 w &#x2208; [0, S-1]</text>
  <text x="615" y="310" class="step-math">(byte decomp + lookup)</text>

  <!-- ===== Bottom annotation: mapping to Section 3 ===== -->
  <text x="450" y="365" text-anchor="middle" font-size="12" fill="#718096">
    &#x2192; 第三章的改進對應：Step 2 &#x2192; Minimax (&#xa7;3.2)，Step 5 &#x2192; Deferred Truncation (&#xa7;3.3)，Step 6 &#x2192; ExplicitRC (&#xa7;3.1)
  </text>
</svg>